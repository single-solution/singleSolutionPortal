<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Single Solution Sync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@media(prefers-color-scheme:dark){:root{--bg:#000;--fg:#f5f5f7;--fg2:#86868b;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.08);--glow:rgba(0,122,255,.3)}}
@media(prefers-color-scheme:light){:root{--bg:#f2f2f7;--fg:#1d1d1f;--fg2:#86868b;--card:rgba(255,255,255,.8);--border:rgba(0,0,0,.06);--glow:rgba(0,122,255,.2)}}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);overflow:hidden}
.container{text-align:center;padding:2rem;max-width:360px}
.pulse-ring{position:relative;width:80px;height:80px;margin:0 auto 2rem}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:#007AFF;animation:spin 1.2s cubic-bezier(.5,.15,.5,.85) infinite}
.pulse-ring::after{inset:8px;border-top-color:transparent;border-right-color:#5856D6;animation-duration:1.8s;animation-direction:reverse}
.dot{position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;background:linear-gradient(135deg,#007AFF,#5856D6);box-shadow:0 0 20px var(--glow);animation:breathe 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.3);opacity:1}}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.5rem;background:linear-gradient(135deg,#007AFF,#5856D6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{font-size:.875rem;color:var(--fg2);line-height:1.6;margin-bottom:1.5rem}
.status{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:.75rem;font-weight:600;color:var(--fg2);background:var(--card);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#FF9F0A;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.retry{margin-top:1.5rem}
.retry button{padding:10px 28px;border:none;border-radius:12px;font-size:.875rem;font-weight:600;color:#fff;background:linear-gradient(135deg,#007AFF,#5856D6);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px var(--glow)}
.retry button:active{transform:scale(.96)}
</style>
</head>
<body>
<div class="container">
  <div class="pulse-ring"><div class="dot"></div></div>
  <h1>Single Solution Sync</h1>
  <p>Connecting to the server...<br>This may take a moment on slow connections.</p>
  <div class="status"><span class="status-dot"></span>Waiting for network</div>
  <div class="retry"><button onclick="location.reload()">Retry</button></div>
</div>
<script>
window.addEventListener('online',function(){location.reload()});
setTimeout(function(){document.querySelector('p').textContent='Still trying to connect. Check your internet connection and tap Retry.'},10000);
</script>
</body>
</html>
